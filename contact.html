<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | ICEYHOST</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#05050a;
color:white;
overflow:hidden;
}

/* background */
.bg{
position:absolute;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(155,92,255,.25), transparent 40%),
radial-gradient(circle at 80% 80%, rgba(59,130,246,.15), transparent 40%);
z-index:-2;
}

/* glow orb */
.orb{
position:absolute;
width:450px;
height:450px;
background:#9b5cff;
filter:blur(150px);
opacity:.15;
border-radius:50%;
animation:float 8s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(60px);}
}

/* card */
.box{
text-align:center;
padding:60px 70px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
border-radius:25px;
backdrop-filter:blur(20px);
animation:pop .8s ease;
}

@keyframes pop{
from{transform:scale(.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

h1{
font-size:3rem;
color:#9b5cff;
text-shadow:0 0 25px #9b5cff;
margin-bottom:20px;
}

.info{
font-size:1.3rem;
margin:10px 0;
opacity:.9;
}

a{
display:inline-block;
margin-top:15px;
padding:12px 25px;
background:linear-gradient(45deg,#7c3aed,#9333ea);
color:white;
text-decoration:none;
border-radius:30px;
font-weight:600;
transition:.3s;
}

a:hover{
transform:scale(1.05);
}

.small{
margin-top:20px;
opacity:.7;
font-size:14px;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="orb"></div>

<div class="box">

<h1>📞 Contact Us</h1>

<div class="info">📱 Phone: 9306713135</div>

<a href="https://discord.gg/QMwRhCMGrZ" target="_blank">
💬 Join Discord Support
</a>

<div class="small">
ICEYHOST Support Team Available on Discord 🚀
</div>

</div>

</body>
</html>
