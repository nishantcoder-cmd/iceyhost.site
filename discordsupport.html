<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Support | ICEYHOST</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background:#05050a;
color:white;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

/* 🌌 Animated Background */
.bg{
position:absolute;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(139,92,246,.35), transparent 30%),
radial-gradient(circle at 80% 80%, rgba(59,130,246,.25), transparent 35%),
radial-gradient(circle at 50% 50%, rgba(236,72,153,.2), transparent 40%);
z-index:-2;
}

.orb{
position:absolute;
width:400px;
height:400px;
border-radius:50%;
filter:blur(120px);
opacity:.25;
animation:float 8s ease-in-out infinite;
}

.orb1{background:#8b5cf6;top:-120px;left:-120px;}
.orb2{background:#3b82f6;bottom:-120px;right:-120px;animation-delay:3s;}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(60px);}
}

/* 🧊 Card */
.box{
width:420px;
padding:45px;
text-align:center;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.1);
border-radius:20px;
box-shadow:0 0 40px rgba(139,92,246,.2);
animation:pop .8s ease;
}

@keyframes pop{
from{transform:scale(.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

h1{
font-size:2.5rem;
color:#9b5cff;
text-shadow:0 0 25px #9b5cff;
}

p{
margin-top:10px;
opacity:.8;
}

/* 🚀 Button */
.btn{
display:inline-block;
margin-top:20px;
padding:12px 25px;
border-radius:30px;
text-decoration:none;
background:linear-gradient(45deg,#7c3aed,#9333ea);
color:white;
font-weight:600;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(147,51,234,.5);
}

/* INFO BOX */
.info{
margin-top:20px;
padding:15px;
border-radius:15px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
}

.online{
color:#22c55e;
font-weight:600;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="box">

<h1>💬 Discord Support</h1>

<p>Get instant help from ICEYHOST team 🚀</p>

<a class="btn" href="https://discord.gg/QMwRhCMGrZ" target="_blank">
Join Discord Server
</a>

<div class="info">
<p class="online">🟢 Support Team: ONLINE</p>
<p>⚡ Avg Response: 5–10 Minutes</p>
<p>🎫 Ticket System Available</p>
</div>

</div>

</body>
</html>
